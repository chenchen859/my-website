    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">DESIGNER</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="works.html">作品</a></li>
                <li><a href="experience.html">履历</a></li>
                <li><a href="skills.html">能力</a></li>
                <li><a href="contact.html">联系</a></li>
            </ul>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="top-banner">
        <div class="top-banner-content">
            <div class="top-banner-text">
                <h1 class="top-banner-title">联系方式</h1>
                <p class="top-banner-subtitle">期待与您的合作，共同创造出色的设计作品</p>
            </div>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="section-header">
                <div class="section-number">04</div>
                <h2 class="section-title">联系方式</h2>
                <p class="section-subtitle">
                    期待与您的合作，共同创造出色的设计作品
                </p>
            </div>
            <div class="contact-container">
                <div class="contact-info">
                    <h3 class="contact-title">联系信息</h3>
                    <div class="contact-item">
                        <div class="contact-icon">📧</div>
                        <div class="contact-details">
                            <h4>邮箱</h4>
                            <p>hello@designer.com</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📱</div>
                        <div class="contact-details">
                            <h4>电话</h4>
                            <p>+86 138 **** 8888</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📍</div>
                        <div class="contact-details">
                            <h4>地址</h4>
                            <p>上海市浦东新区</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">🌐</div>
                        <div class="contact-details">
                            <h4>社交媒体</h4>
                            <p>Behance / Dribbble / Instagram</p>
                        </div>
                    </div>
                </div>
                <div class="contact-form">
                    <form>
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" placeholder="请输入您的姓名">
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" placeholder="请输入您的邮箱">
                        </div>
                        <div class="form-group">
                            <label for="message">留言</label>
                            <textarea id="message" placeholder="请输入您的留言"></textarea>
                        </div>
                        <button type="submit" class="submit-btn">发送消息</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-social">
                    <a href="#">📱</a>
                    <a href="#">📧</a>
                    <a href="#">🌐</a>
                    <a href="#">🔗</a>
                </div>
                <p class="footer-copyright">
                    © 2026 Designer Portfolio. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
